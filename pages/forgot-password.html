<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Forgot Password | KickUpNepal</title>
    
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap" rel="stylesheet"/>
    
    <link rel="stylesheet" href="../assets/css/variables.css"/>
    <link rel="stylesheet" href="../assets/css/global.css"/>
    <link rel="stylesheet" href="../assets/css/layout.css"/>
    <link rel="stylesheet" href="../assets/css/components.css"/>
    <link rel="stylesheet" href="../assets/css/pages/auth.css"/>
</head>
<body>

<main class="auth-layout" style="justify-content: center; align-items: center; background-color: var(--color-surface);">
    <div class="auth-form-pane" style="max-width: 500px; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); height: auto; padding: 4rem;">
        <div class="auth-form-container">
            <a href="login.html" class="back-btn" style="margin-bottom: 1rem;">
                <span class="material-symbols-outlined">arrow_back</span>
                Back to Sign In
            </a>

            <div class="auth-header text-center">
                <span class="material-symbols-outlined" style="font-size: 3rem; color: var(--color-nepal-blue); margin-bottom: 1rem;">lock_reset</span>
                <h1 class="font-black">Forgot Password?</h1>
                <p>Enter the email associated with your account and we'll send a link to reset your password.</p>
            </div>

            <form action="reset-password.html" method="GET">
                <div class="form-group">
                    <input type="email" id="email" class="form-input" placeholder=" " required />
                    <label for="email" class="form-label">Email Address</label>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; border-radius: var(--radius-md);">
                    Send Reset Link
                </button>
            </form>
        </div>
    </div>
</main>

<script src="../assets/js/auth.js"></script>

<script src="../assets/js/products.js"></script>
<script src="../assets/js/cart.js"></script>
<script src="../assets/js/search.js"></script>
</body>
</html>
