<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Verify OTP | KickUpNepal</title>
    
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap" rel="stylesheet"/>
    
    <link rel="stylesheet" href="../assets/css/variables.css"/>
    <link rel="stylesheet" href="../assets/css/global.css"/>
    <link rel="stylesheet" href="../assets/css/layout.css"/>
    <link rel="stylesheet" href="../assets/css/components.css"/>
    <link rel="stylesheet" href="../assets/css/pages/auth.css"/>
</head>
<body>

<main class="auth-layout" style="justify-content: center; align-items: center; background-color: var(--color-surface);">
    <div class="auth-form-pane" style="max-width: 500px; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); height: auto; padding: 4rem;">
        <div class="auth-form-container">
            <a href="signup.html" class="back-btn" style="margin-bottom: 1rem;">
                <span class="material-symbols-outlined">arrow_back</span>
                Back
            </a>

            <div class="auth-header" style="text-align: center;">
                <span class="material-symbols-outlined" style="font-size: 3rem; color: var(--color-nepal-blue); margin-bottom: 1rem;">mark_email_read</span>
                <h1 class="font-black">Verify Email.</h1>
                <p>We've sent a 4-digit code to your email address. Please enter it below.</p>
            </div>

            <form action="dashboard.html" method="GET">
                <div class="otp-inputs">
                    <input type="text" class="otp-input" maxlength="1" autofocus />
                    <input type="text" class="otp-input" maxlength="1" />
                    <input type="text" class="otp-input" maxlength="1" />
                    <input type="text" class="otp-input" maxlength="1" />
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; border-radius: var(--radius-md);">
                    Verify Account
                </button>
            </form>

            <div style="text-align: center; margin-top: 2rem;">
                <p class="text-sm text-muted">Didn't receive code? <a href="#" class="auth-link">Resend in 0:59</a></p>
            </div>
        </div>
    </div>
</main>

<script src="../assets/js/auth.js"></script>

<script src="../assets/js/products.js"></script>
<script src="../assets/js/cart.js"></script>
<script src="../assets/js/search.js"></script>
</body>
</html>
