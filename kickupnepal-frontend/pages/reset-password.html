<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Reset Password | KickUpNepal</title>
    
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap" rel="stylesheet"/>
    
    <link rel="stylesheet" href="../assets/css/variables.css"/>
    <link rel="stylesheet" href="../assets/css/global.css"/>
    <link rel="stylesheet" href="../assets/css/layout.css"/>
    <link rel="stylesheet" href="../assets/css/components.css"/>
    <link rel="stylesheet" href="../assets/css/pages/auth.css"/>
</head>
<body>

<main class="auth-layout" style="justify-content: center; align-items: center; background-color: var(--color-surface);">
    <div class="auth-form-pane" style="max-width: 500px; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); height: auto; padding: 4rem;">
        <div class="auth-form-container">
            <div class="auth-header text-center">
                <span class="material-symbols-outlined" style="font-size: 3rem; color: var(--color-nepal-red); margin-bottom: 1rem;">key</span>
                <h1 class="font-black">Create New Password.</h1>
                <p>Your new password must be different from previous used passwords.</p>
            </div>

            <form action="login.html" method="GET">
                <div class="form-group">
                    <input type="password" id="password" class="form-input" placeholder=" " required />
                    <label for="password" class="form-label">New Password</label>
                    <span class="material-symbols-outlined password-toggle">visibility</span>
                </div>
                
                <div class="form-group">
                    <input type="password" id="cpassword" class="form-input" placeholder=" " required />
                    <label for="cpassword" class="form-label">Confirm New Password</label>
                    <span class="material-symbols-outlined password-toggle">visibility</span>
                </div>

                <ul class="text-xs text-muted mb-6" style="list-style: disc; padding-left: 1rem;">
                    <li>Must be at least 8 characters long</li>
                    <li>Must contain at least 1 number</li>
                    <li>Must contain at least 1 special character</li>
                </ul>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; border-radius: var(--radius-md);">
                    Reset Password
                </button>
            </form>
        </div>
    </div>
</main>

<script src="../assets/js/auth.js"></script>

<script src="../assets/js/products.js"></script>
<script src="../assets/js/cart.js"></script>
<script src="../assets/js/search.js"></script>
</body>
</html>
