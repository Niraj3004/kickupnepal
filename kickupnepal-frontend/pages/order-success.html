<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Order Confirmed | KickUpNepal</title>
    
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,1&display=swap" rel="stylesheet"/>
    
    <link rel="stylesheet" href="../assets/css/variables.css"/>
    <link rel="stylesheet" href="../assets/css/global.css"/>
    <link rel="stylesheet" href="../assets/css/layout.css"/>
    <link rel="stylesheet" href="../assets/css/components.css"/>
    
    <style>
        .success-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--color-surface);
            padding: 2rem;
            text-align: center;
        }

        .success-card {
            background-color: var(--color-white);
            padding: 4rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            max-width: 600px;
            width: 100%;
        }

        .success-icon {
            font-size: 5rem;
            color: var(--color-success);
            margin-bottom: 1.5rem;
        }

        .order-number {
            display: inline-block;
            background-color: var(--color-surface);
            padding: 0.5rem 1rem;
            border-radius: var(--radius-sm);
            font-weight: 800;
            font-family: var(--font-headline);
            margin: 1.5rem 0 3rem 0;
            border: 1px dashed var(--color-text-muted);
        }
    </style>
</head>
<body>

<main class="success-layout">
    <div class="success-card">
        <span class="material-symbols-outlined success-icon">check_circle</span>
        <h1 class="text-4xl font-black mb-2">Order Confirmed!</h1>
        <p class="text-muted text-lg">Thank you for your purchase. We've received your order and are getting it ready to ship.</p>
        
        <div class="order-number">
            Order #KUN-8843
        </div>

        <div class="flex gap-4 justify-center">
            <a href="dashboard.html" class="btn btn-outline">Track Order</a>
            <a href="../index.html" class="btn btn-primary">Continue Shopping</a>
        </div>
    </div>
</main>

<script src="../assets/js/products.js"></script>
<script src="../assets/js/cart.js"></script>
<script src="../assets/js/search.js"></script>
</body>
</html>
