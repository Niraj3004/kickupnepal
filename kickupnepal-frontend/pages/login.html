<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign In | KickUpNepal</title>
    
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0&display=swap" rel="stylesheet"/>
    
    <link rel="stylesheet" href="../assets/css/variables.css"/>
    <link rel="stylesheet" href="../assets/css/global.css"/>
    <link rel="stylesheet" href="../assets/css/layout.css"/>
    <link rel="stylesheet" href="../assets/css/components.css"/>
    <link rel="stylesheet" href="../assets/css/pages/auth.css"/>
</head>
<body>

<main class="auth-layout">
    <!-- Image Pane -->
    <div class="auth-image-pane">
        <img src="../assets/images/products/d.png" alt="Premium Sneakers"/>
        <div class="auth-overlay"></div>
        <div class="auth-quote">
            <h2>Welcome Back.</h2>
            <p>Sign in to access your curated sneaker drops and exclusive collections.</p>
        </div>
    </div>

    <!-- Form Pane -->
    <div class="auth-form-pane">
        <div class="auth-form-container">
            <a href="../index.html" class="back-btn">
                <span class="material-symbols-outlined">arrow_back</span>
                Back to Store
            </a>

            <div class="auth-header">
                <h1 class="font-black">Sign In</h1>
                <p>Enter your details to access your KickUpNepal account.</p>
            </div>

            <form action="dashboard.html" method="GET">
                <div class="form-group">
                    <input type="email" id="email" class="form-input" placeholder=" " required />
                    <label for="email" class="form-label">Email Address</label>
                </div>

                <div class="form-group">
                    <input type="password" id="password" class="form-input" placeholder=" " required />
                    <label for="password" class="form-label">Password</label>
                    <span class="material-symbols-outlined password-toggle">visibility</span>
                </div>

                <div class="auth-action-row">
                    <label style="display:flex; align-items:center; gap:0.5rem; cursor:pointer;">
                        <input type="checkbox" style="accent-color: var(--color-nepal-blue);"/>
                        <span>Remember Me</span>
                    </label>
                    <a href="forgot-password.html" class="auth-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; border-radius: var(--radius-md);">
                    Sign In
                </button>
            </form>

            <div style="text-align: center; margin-top: 3rem;">
                <p>New to KickUpNepal? <a href="signup.html" class="auth-link" style="color: var(--color-nepal-red);">Create an Account</a></p>
            </div>
        </div>
    </div>
</main>

<script src="../assets/js/auth.js"></script>

<script src="../assets/js/products.js"></script>
<script src="../assets/js/cart.js"></script>
<script src="../assets/js/search.js"></script>
</body>
</html>
